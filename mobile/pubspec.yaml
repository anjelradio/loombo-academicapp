name: mobile
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  animate_do: ^4.2.0
  dio: ^5.9.2
  flutter:
    sdk: flutter
  flutter_dotenv: ^6.0.0
  flutter_riverpod: ^3.3.1
  formz: ^0.8.0
  go_router: ^17.2.0
  google_fonts: ^8.0.2
  shared_preferences: ^2.5.5
  skeletonizer: ^2.1.3

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/
    - assets/images/bg/
    - assets/images/app_introduction/
    - assets/images/logo/
    - assets/images/headers/
